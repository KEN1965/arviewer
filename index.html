<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<title>AR Viewer</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

<style>

body{
margin:0;
background:#0b0b0b;
font-family:sans-serif;
color:white;
text-align:center;
}

header{
font-size:24px;
padding:18px;
font-weight:600;
}

#viewer{
width:100%;
height:75vh;
background:#000;
}

.toolbar{
margin:15px;
}

label,button{

background:#1f6feb;
border:none;
color:white;
padding:12px 18px;
border-radius:8px;
font-size:14px;
cursor:pointer;

}

label:hover,button:hover{
background:#388bfd;
}

input[type=file]{
display:none;
}

.footer{
font-size:12px;
opacity:0.6;
margin-top:10px;
}

</style>

</head>

<body>

<header>KEN AR VIEWER</header>

<div class="toolbar">

<label for="fileInput">📂 モデル選択</label>
<button onclick="shareLink()">🔗 共有</button>

</div>

<input id="fileInput" type="file" accept=".glb,.usdz">

<model-viewer

id="viewer"

camera-controls
auto-rotate
auto-rotate-delay="0"

shadow-intensity="1"

environment-image="https://modelviewer.dev/shared-assets/environments/spruit_sunrise_1k_HDR.hdr"

ar
ar-modes="scene-viewer quick-look webxr"

style="display:none">

</model-viewer>

<div class="footer">
GLB / USDZ AR Viewer
</div>

<script>

const viewer = document.getElementById("viewer")
const fileInput = document.getElementById("fileInput")

let glbURL = null
let usdzURL = null

// ファイル選択
fileInput.addEventListener("change", e => {

const file = e.target.files[0]

const url = URL.createObjectURL(file)

const ext = file.name.split(".").pop().toLowerCase()

viewer.style.display="block"

if(ext==="glb"){

glbURL=url
viewer.src=glbURL

}

if(ext==="usdz"){

usdzURL=url
viewer.setAttribute("ios-src",usdzURL)

}

})

// URL共有
function shareLink(){

if(!glbURL){
alert("モデルを読み込んでください")
return
}

const url=location.origin+location.pathname+"?model="+glbURL

navigator.clipboard.writeText(url)

alert("リンクコピーしました")

}

</script>

</body>
</html>
