<!DOCTYPE html>

<html lang="ja">
<head>

<meta charset="UTF-8">
<title>GLB + USDZ AR Viewer</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

<style>

body{
margin:0;
background:#0b0b0b;
font-family:sans-serif;
color:white;
text-align:center;
}

header{
font-size:24px;
padding:18px;
font-weight:600;
}

#viewer{
width:100%;
height:70vh;
background:#000;
}

.toolbar{
margin:20px;
}

label{
background:#0078d7;
color:white;
padding:14px 30px;
border-radius:8px;
cursor:pointer;
font-size:18px;
}

label:hover{
background:#0a84ff;
}

input[type=file]{
display:none;
}

.arArea{
margin-top:20px;
display:none;
}

.arText{
font-size:18px;
margin-bottom:12px;
}

#arButton{
background:#0078d7;
color:white;
border:none;
padding:16px 40px;
font-size:20px;
border-radius:40px;
cursor:pointer;
box-shadow:0 6px 12px rgba(0,0,0,0.3);
}

#arButton:hover{
background:#0a84ff;
}

.footer{
font-size:12px;
opacity:0.6;
margin-top:15px;
}

</style>

</head>

<body>

<header>GLB + USDZ AR Viewer</header>

<div class="toolbar">
<label for="fileInput">📂 モデルを選択 (.glb / .usdz)</label>
</div>

<input id="fileInput" type="file" accept=".glb,.usdz">

<model-viewer
id="viewer"
camera-controls
auto-rotate
auto-rotate-delay="0"
shadow-intensity="1"
environment-image="https://modelviewer.dev/shared-assets/environments/spruit_sunrise_1k_HDR.hdr"
ar
ar-modes="scene-viewer quick-look webxr"
style="display:none"> </model-viewer>

<div class="arArea" id="arArea">

<p class="arText">
👉 ファイルを選んだ後、<br>
下の「AR体験」ボタンを押すとARが始まります。
</p>

<button id="arButton">AR体験</button>

</div>

<div class="footer">
GLB / USDZ AR Viewer
</div>

<script>

const viewer = document.getElementById("viewer")
const fileInput = document.getElementById("fileInput")
const arButton = document.getElementById("arButton")
const arArea = document.getElementById("arArea")

fileInput.addEventListener("change", e => {

const file = e.target.files[0]
const url = URL.createObjectURL(file)

const ext = file.name.split(".").pop().toLowerCase()

viewer.style.display="block"

if(ext==="glb"){

// GLB表示
viewer.src=url
viewer.removeAttribute("ios-src")

}

if(ext==="usdz"){

// GLB表示を完全削除
viewer.src=""
viewer.removeAttribute("src")

// USDZをAR用にセット
viewer.setAttribute("ios-src",url)

}

arArea.style.display="block"

})

// ARボタン
arButton.addEventListener("click", () => {

viewer.activateAR()

})

</script>

</body>
</html>
