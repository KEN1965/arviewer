<!DOCTYPE html>

<html lang="ja">
<head>

<meta charset="UTF-8">
<title>KEN AR Viewer</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

<style>

body{
margin:0;
background:#0b0b0b;
font-family:sans-serif;
color:white;
text-align:center;
}

header{
font-size:24px;
padding:16px;
font-weight:600;
}

#viewer{
width:100%;
height:65vh;
background:#000;
}

.toolbar{
margin:20px;
}

label{
background:#0078d7;
color:white;
padding:14px 28px;
border-radius:8px;
cursor:pointer;
font-size:18px;
}

label:hover{
background:#0a84ff;
}

input[type=file]{
display:none;
}

/* AR説明 */

.usdzMessage{

display:none;
position:absolute;
bottom:160px;

left:50%;
transform:translateX(-50%);

font-size:20px;
text-align:center;

padding:18px;

max-width:90%;

}

/* ARボタン */

.arArea{
margin-top:20px;
display:none;
}

#arButton{

background:#0078d7;
color:white;
border:none;

padding:16px 42px;

font-size:20px;

border-radius:40px;

cursor:pointer;

box-shadow:0 6px 12px rgba(0,0,0,0.3);

}

#arButton:hover{
background:#0a84ff;
}

.footer{
font-size:12px;
opacity:0.6;
margin-top:14px;
}

</style>

</head>

<body>

<header>GLB + USDZ AR Viewer</header>

<div class="toolbar">

<label for="fileInput">📂 モデルを選択 (.glb / .usdz)</label>

</div>

<input id="fileInput" type="file" accept=".glb,.usdz">

<model-viewer
id="viewer"
camera-controls
auto-rotate
auto-rotate-delay="0"
shadow-intensity="1"
environment-image="https://modelviewer.dev/shared-assets/environments/spruit_sunrise_1k_HDR.hdr"
ar
ar-modes="scene-viewer quick-look webxr"
style="display:none"> </model-viewer>

<div id="usdzMessage" class="usdzMessage">

📱 このモデルはAR専用です<br>
下の「AR体験」ボタンを押してください

</div>

<div class="arArea" id="arArea">

<button id="arButton">AR体験</button>

</div>

<div class="footer">
KEN AR Viewer
</div>

<script>

const viewer = document.getElementById("viewer")
const fileInput = document.getElementById("fileInput")
const arButton = document.getElementById("arButton")
const arArea = document.getElementById("arArea")
const usdzMessage = document.getElementById("usdzMessage")

fileInput.addEventListener("change", e => {

const file = e.target.files[0]
const url = URL.createObjectURL(file)

const ext = file.name.split(".").pop().toLowerCase()

// 完全リセット
viewer.removeAttribute("src")
viewer.removeAttribute("ios-src")

viewer.style.display="block"

if(ext==="glb"){

viewer.src=url

usdzMessage.style.display="none"

}

if(ext==="usdz"){

viewer.setAttribute("ios-src",url)

usdzMessage.style.display="block"

}

arArea.style.display="block"

})

// AR体験

arButton.addEventListener("click", () => {

viewer.activateAR()

})

</script>

</body>
</html>
